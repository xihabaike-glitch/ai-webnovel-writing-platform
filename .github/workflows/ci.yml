name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run prisma:generate
      - run: npm run prisma:validate
      - name: Rehearse fresh and legacy SQLite migrations
        run: npm run test:migrations
      - name: Verify Docker legacy baseline configuration
        run: npm run test:compose-config
      - run: npm run lint
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: file:./ci-build.db
      - run: npm audit --omit=dev --audit-level=high
